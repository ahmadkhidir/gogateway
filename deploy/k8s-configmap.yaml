# GoGateway — Kubernetes ConfigMap
#
# Apply: kubectl apply -f deploy/k8s-configmap.yaml
#
# The gateway configuration is stored in a ConfigMap and mounted as a file
# in the Deployment. API keys should use a Secret in production, but for
# development the api-keys.yaml is included here.

apiVersion: v1
kind: ConfigMap
metadata:
  name: gogateway-config
  labels:
    app: gogateway
data:
  gogateway.yaml: |
    gateway:
      listen: ":8080"
      metrics_listen: ":9090"
      shutdown_timeout: 15s
      log_level: "info"

    redis:
      addr: "gogateway-redis:6379"
      password: ""
      db: 0
      pool_size: 20

    routes:
      - id: "health"
        path: "/health"
        methods: ["GET"]
        upstreams:
          - url: "http://httpbin.org:80/status/200"

      - id: "api"
        path: "/api/*"
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        upstreams:
          - url: "http://httpbin.org:80"
        auth:
          jwt:
            required: true
            issuers: ["https://auth.example.com"]
          api_key:
            required: true
        rate_limit:
          enabled: true
          requests: 100
          window: 1m
          per_client: true

  api-keys.yaml: |
    api_keys:
      - id: "key_dev_admin"
        key: "gw_dev_admin_key_123"
        service: ""
        rate_tier: "unlimited"

      - id: "key_dev_pro"
        key: "gw_dev_pro_key_456"
        service: "users-api"
        rate_tier: "pro"

      - id: "key_dev_basic"
        key: "gw_dev_basic_key_789"
        service: ""
        rate_tier: "basic"
