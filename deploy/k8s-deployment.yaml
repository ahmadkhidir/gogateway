# GoGateway — Kubernetes Deployment
#
# Apply: kubectl apply -f deploy/k8s-deployment.yaml
#
# A stateless Deployment that can be scaled horizontally.
# Rate limiting uses Redis (deployed separately) and falls back to
# in-memory counters if Redis is unreachable.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gogateway
  labels:
    app: gogateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gogateway
  template:
    metadata:
      labels:
        app: gogateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: gogateway
          image: gogateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: GOGATEWAY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gogateway-secret
                  key: jwt-secret
                  optional: true
            - name: GOGATEWAY_API_KEY_FILE
              value: "/etc/gogateway/api-keys.yaml"
          volumeMounts:
            - name: config
              mountPath: /etc/gogateway
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "32Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
      volumes:
        - name: config
          configMap:
            name: gogateway-config
