# GoGateway — Development environment
#
# Usage:
#   docker compose up -d
#   curl http://localhost:8080/health
#   curl http://localhost:9090/metrics
#
# Services:
#   gogateway  :8080  — API gateway
#   redis      :6379  — Rate limiting / key store
#   prometheus :9090  — Metrics scraping (config in deploy/prometheus.yml)
#
# Rate limiting requires Redis. If Redis is unavailable the gateway falls
# back to in-memory rate limiting (degraded but functional).

volumes:
  prometheus_data:

networks:
  gogateway:

services:
  redis:
    image: redis:7-alpine
    container_name: gogateway-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - gogateway
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  gogateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gogateway
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - GOGATEWAY_JWT_SECRET=change-me-in-production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gogateway

  prometheus:
    image: prom/prometheus:latest
    container_name: gogateway-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      - gogateway
    networks:
      - gogateway
