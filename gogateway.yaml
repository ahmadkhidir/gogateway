# GoGateway — Development Configuration
gateway:
  listen: ":8080"
  metrics_listen: ":9090"
  shutdown_timeout: 15s
  log_level: "info"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 20

routes:
  # Public health endpoint — no auth required.
  - id: "health"
    path: "/health"
    methods: ["GET"]
    upstreams:
      - url: "http://httpbin.org:80/status/200"

  # Protected API — JWT required, API key as fallback.
  - id: "api"
    path: "/api/*"
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    upstreams:
      - url: "http://httpbin.orgn:80"
    auth:
      jwt:
        required: true
        issuers: ["https://auth.example.com"]
      api_key:
        required: true
    rate_limit:
      enabled: true
      requests: 5
      window: 10s
    circuit_breaker:
      enabled: true
      threshold: 3
      timeout: 5s
