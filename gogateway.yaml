# GoGateway — Development Configuration
#
# Works with docker-compose.yml (Redis host: "redis")
# or standalone (update redis.addr to "localhost:6379").
gateway:
  listen: ":8080"
  metrics_listen: ":9090"
  shutdown_timeout: 15s
  log_level: "info"

redis:
  addr: "redis:6379"
  password: ""
  db: 0
  pool_size: 20

routes:
  # Built-in health endpoint is always available at /health.
  # This route proxies health checks to an upstream for illustration.
  - id: "example"
    path: "/*"
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    upstreams:
      - url: "http://httpbin.org:80"
      - url: "http://google.com:80"
    auth:
      jwt:
        required: false
      api_key:
        required: false
    rate_limit:
      enabled: false
    circuit_breaker:
      enabled: false
